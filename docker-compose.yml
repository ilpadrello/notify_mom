version: '3.8'

services:
  notify-mom:
    # Use plain Node.js image, no custom Dockerfile
    image: node:20-slim
    container_name: notify-mom-app
    working_dir: /app
    
    # Mount local files and directories
    volumes:
      # Mount entire app directory (includes src, build, package.json, tsconfig.json, etc.)
      - .:/app
      # Persist data and logs
      - ./data:/app/data
      - ./logs:/app/logs
      # Mount token.json from host (read-write so it can be updated during auth)
      - ./token.json:/app/token.json
    
    environment:
      - NODE_ENV=${NODE_ENV:-production} # Default to production if not set
      - LOG_LEVEL=${LOG_LEVEL:-info} # Default to info if not set
      - DATABASE_PATH=/app/data/app.db
      - SYNC_INTERVAL_MINUTES=${SYNC_INTERVAL_MINUTES:-15} # Default to 15 if not set
      # Google Sheets Configuration
      - GOOGLE_SHEETS_SPREADSHEET_ID=${GOOGLE_SHEETS_SPREADSHEET_ID}
      - GOOGLE_SHEETS_API_KEY=${GOOGLE_SHEETS_API_KEY}
      - GOOGLE_SERVICE_ACCOUNT_EMAIL=${GOOGLE_SERVICE_ACCOUNT_EMAIL}
      - GOOGLE_SERVICE_ACCOUNT_KEY=${GOOGLE_SERVICE_ACCOUNT_KEY}
      # Email Notification Configuration
      - ENABLE_EMAIL_NOTIFICATIONS=${ENABLE_EMAIL_NOTIFICATIONS}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - NOTIFY_EMAIL_TO=${NOTIFY_EMAIL_TO}
      # Telegram Notification Configuration
      - ENABLE_TELEGRAM_NOTIFICATIONS=${ENABLE_TELEGRAM_NOTIFICATIONS}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # Logging Configuration
      - LOG_FILE_PATH=/app/logs/app.log
      - LOG_FILE_MAX_SIZE=10485760
      - LOG_FILE_MAX_FILES=5
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - TZ=Europe/Paris # Set timezone for consistent logging timestamps
    
    # Choose one of the following command options:
    
    # Option 1: If npm install hasn't been run yet on the Raspberry Pi
    command: /bin/sh -c "npm install --prefer-offline --no-audit && node build/index.js"
    
    # Option 2: If npm install has already been run (faster startup)
    #command: node build/index.js
    
    restart: unless-stopped
    networks:
      - notify-mom-network
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  notify-mom-network:

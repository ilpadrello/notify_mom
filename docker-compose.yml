version: '3.8'

services:
  notify-mom:
    # Use prebuilt image instead of building
    # This assumes the image has been built with: docker buildx build -t notify-mom:latest .
    image: notify-mom:latest
    container_name: notify-mom-app
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - DATABASE_PATH=/app/data/app.db
      - SYNC_INTERVAL_MINUTES=15
      # Google Sheets Configuration
      - GOOGLE_SHEETS_SPREADSHEET_ID=${GOOGLE_SHEETS_SPREADSHEET_ID}
      - GOOGLE_SHEETS_API_KEY=${GOOGLE_SHEETS_API_KEY}
      - GOOGLE_SERVICE_ACCOUNT_EMAIL=${GOOGLE_SERVICE_ACCOUNT_EMAIL}
      - GOOGLE_SERVICE_ACCOUNT_KEY=${GOOGLE_SERVICE_ACCOUNT_KEY}
      # Email Notification Configuration
      - ENABLE_EMAIL_NOTIFICATIONS=${ENABLE_EMAIL_NOTIFICATIONS}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - NOTIFY_EMAIL_TO=${NOTIFY_EMAIL_TO}
      # Telegram Notification Configuration
      - ENABLE_TELEGRAM_NOTIFICATIONS=${ENABLE_TELEGRAM_NOTIFICATIONS}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # Logging Configuration
      - LOG_FILE_PATH=/app/logs/app.log
      - LOG_FILE_MAX_SIZE=10485760
      - LOG_FILE_MAX_FILES=5
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
      - ./token.json:/app/token.json:ro
      - ./.env:/app/.env:ro
    restart: unless-stopped
    networks:
      - notify-mom-network
    # Optional: Add resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  app-data:
    driver: local
  app-logs:
    driver: local

networks:
  notify-mom-network:
    driver: bridge
